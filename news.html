<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>News | Terra Meta</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,Helvetica,sans-serif;background:#f8fafc;color:#06142d}

/* HEADER */
header{
position:sticky;top:0;z-index:1000;
background:#fff;border-bottom:1px solid #eee;
padding:18px 20px;
text-align:center;
}

.brand{
font-size:28px;
font-weight:900;
letter-spacing:2px;
}

nav{
margin-top:10px;
display:flex;
justify-content:center;
gap:18px;
flex-wrap:wrap;
}

nav a{
font-weight:700;
text-decoration:none;
color:#06142d;
}

/* HERO */
.hero{
padding:60px 20px;
background:linear-gradient(120deg,#06142d,#0b3972);
color:white;
text-align:center;
}

.hero h1{font-size:38px}

/* GRID */
.container{
max-width:1200px;
margin:auto;
padding:40px 20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:25px;
}

/* CARD */
.card{
background:#fff;
border-radius:14px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.05);
transition:0.3s;
display:flex;
flex-direction:column;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 20px 40px rgba(0,0,0,0.1);
}

.thumb{
height:220px;
overflow:hidden;
background:#eee;
}

.thumb img{
width:100%;
height:100%;
object-fit:cover;
}

.content{
padding:20px;
display:flex;
flex-direction:column;
flex:1;
}

.source{
color:#3d82ff;
font-size:13px;
font-weight:bold;
}

.date{
font-size:13px;
color:#666;
margin:5px 0 10px;
}

.title{
font-size:18px;
font-weight:700;
margin-bottom:10px;
display:-webkit-box;
-webkit-line-clamp:2;
-webkit-box-orient:vertical;
overflow:hidden;
}

.desc{
font-size:14px;
color:#666;
flex:1;
display:-webkit-box;
-webkit-line-clamp:3;
-webkit-box-orient:vertical;
overflow:hidden;
}

.read{
margin-top:15px;
font-weight:bold;
color:#3d82ff;
}

/* FOOTER */
footer{
background:#06142d;
color:white;
padding:30px 20px;
text-align:center;
margin-top:40px;
}

footer p{font-size:14px;color:#ccc}
</style>
</head>

<body>

<header>
<div class="brand">TERRA META</div>

<nav>
<a href="index.html">HOME</a>
<a href="index.html#about">ABOUT</a>
<a href="index.html#solutions">SOLUTIONS</a>
<a href="index.html#technology">TECH</a>
<a href="news.html">NEWS</a>
</nav>
</header>

<section class="hero">
<h1>Latest Tech News</h1>
<p>AI · Technology · Innovation</p>
</section>

<div class="container">
<div class="grid" id="newsGrid"></div>
</div>

<footer>
<p>Terra Meta Co., Ltd.</p>
<p>CEO: Jungjin Cho</p>
<p>Email: contact@terrameta.co</p>
<p>Mobile: +82 10 2252 7782</p>
<p>Tel: +82 70 4915 2724</p>
<p>Seoul, Republic of Korea</p>
<p>© 2026 Terra Meta Co., Ltd.</p>
</footer>

<script>
async function loadNews(){
try{
const res = await fetch("./news.json",{cache:"no-store"});
const data = await res.json();

const grid=document.getElementById("newsGrid");

data
.sort((a,b)=>new Date(b.publishedAt)-new Date(a.publishedAt))
.slice(0,12)
.forEach(item=>{

const card=document.createElement("div");
card.className="card";

card.innerHTML=`
<a href="${item.url}" target="_blank">
<div class="thumb">
<img src="${item.image}" onerror="this.src='https://via.placeholder.com/400x200'">
</div>

<div class="content">
<div class="source">${item.source}</div>
<div class="date">${new Date(item.publishedAt).toLocaleDateString()}</div>
<div class="title">${item.title}</div>
<div class="desc">${item.summary}</div>
<div class="read">Read →</div>
</div>
</a>
`;

grid.appendChild(card);
});

}catch(e){
document.getElementById("newsGrid").innerHTML="Failed to load news";
}
}

loadNews();
</script>

</body>
</html>
