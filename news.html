<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>News | Terra Meta</title>

<style>
:root{
--primary:#0b3972;
--accent:#3d82ff;
--bg:#f8fafc;
--text:#111;
--muted:#666;
}

body{
margin:0;
font-family:Arial, sans-serif;
background:var(--bg);
color:var(--text);
}

header{
background:white;
padding:20px;
text-align:center;
border-bottom:1px solid #eee;
}

.logo{
font-size:26px;
font-weight:900;
}

nav{
margin-top:10px;
display:flex;
justify-content:center;
gap:20px;
}

nav a{
text-decoration:none;
color:#111;
font-weight:700;
}

.hero{
padding:60px 20px;
text-align:center;
background:linear-gradient(120deg,#06142d,#0b3972);
color:white;
}

.hero h1{
font-size:42px;
margin-bottom:10px;
}

.container{
max-width:1200px;
margin:auto;
padding:40px 20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:25px;
}

.card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.05);
transition:0.3s;
display:flex;
flex-direction:column;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 20px 40px rgba(0,0,0,0.1);
}

.thumb{
height:200px;
overflow:hidden;
background:#eee;
}

.thumb img{
width:100%;
height:100%;
object-fit:cover;
}

.content{
padding:20px;
flex:1;
display:flex;
flex-direction:column;
}

.source{
color:var(--accent);
font-size:13px;
font-weight:bold;
}

.date{
font-size:13px;
color:var(--muted);
margin:5px 0 10px;
}

.title{
font-size:18px;
font-weight:700;
margin-bottom:10px;
display:-webkit-box;
-webkit-line-clamp:2;
-webkit-box-orient:vertical;
overflow:hidden;
}

.desc{
font-size:14px;
color:var(--muted);
flex:1;
display:-webkit-box;
-webkit-line-clamp:3;
-webkit-box-orient:vertical;
overflow:hidden;
}

.read{
margin-top:15px;
font-weight:bold;
color:var(--accent);
}

footer{
background:#06142d;
color:white;
text-align:center;
padding:30px;
margin-top:40px;
}
</style>
</head>

<body>

<header>
<div class="logo">TERRA META</div>
<nav>
<a href="index.html">HOME</a>
<a href="news.html">NEWS</a>
</nav>
</header>

<section class="hero">
<h1>Latest Tech News</h1>
<p>AI · Technology · Innovation</p>
</section>

<div class="container">
<div class="grid" id="newsGrid"></div>
</div>

<footer>
© 2026 Terra Meta Co., Ltd.
</footer>

<script>
async function loadNews(){
try{
const res = await fetch("./news.json",{cache:"no-store"});
const data = await res.json();

const grid = document.getElementById("newsGrid");

data
.sort((a,b)=>new Date(b.publishedAt)-new Date(a.publishedAt))
.slice(0,12)
.forEach(item=>{

const card=document.createElement("div");
card.className="card";

card.innerHTML=`
<a href="${item.url}" target="_blank">
<div class="thumb">
<img src="${item.image}" onerror="this.src='https://via.placeholder.com/400x200'">
</div>

<div class="content">
<div class="source">${item.source}</div>
<div class="date">${new Date(item.publishedAt).toLocaleDateString()}</div>
<div class="title">${item.title}</div>
<div class="desc">${item.summary}</div>
<div class="read">Read →</div>
</div>
</a>
`;

grid.appendChild(card);
});

}catch(e){
document.getElementById("newsGrid").innerHTML="Failed to load news";
}
}

loadNews();
</script>

</body>
</html>
