<!DOCTYPE html>

<head>
  <meta charset="UTF-8" />

    * {margin:0; padding:0; box-sizing:border-box;}

    body {
      font-family: Arial, sans-serif;

      color:#06142d;
    }

    header {

      justify-content:space-between;

      padding:20px 50px;
      border-bottom:1px solid #eee;
      background:#fff;
    }

    .logo {
      display:flex;
      align-items:center;
      gap:15px;
    }

    .logo img {
      height:50px;
    }

    nav a {
      margin-left:30px;
      text-decoration:none;
      color:#06142d;
      font-weight:bold;
    }

    .hero {
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:80px;
      background:linear-gradient(120deg,#06142d,#0b3972);
      color:white;
    }

    .hero h1 {
      font-size:60px;
      line-height:1.1;
    }

    .hero span {
      color:#3d82ff;
    }

    .hero p {
      margin-top:20px;
      font-size:18px;
      color:#ddd;
    }

    .hero img {
      width:350px;
    }

    .btn {
      display:inline-block;
      margin-top:25px;
      padding:12px 24px;
      background:#2568dc;
      color:white;
      text-decoration:none;
      border-radius:6px;
    }

    .section {
      padding:60px;
    }

    .cards {
      display:grid;
      grid-template-columns:repeat(4,1fr);
      margin-top:40px;
      border-top:1px solid #ddd;
      border-left:1px solid #ddd;
    }

    .card {
      padding:30px;
      border-right:1px solid #ddd;
      border-bottom:1px solid #ddd;
      text-align:center;
    }

    footer {
      padding:25px 60px;
      background:#06142d;
      color:white;
      display:flex;
      justify-content:space-between;
    }

    .footer-logo {
      font-weight:bold;
      letter-spacing:2px;
    }

    @media(max-width:900px){
      .hero {flex-direction:column;}
      .cards {grid-template-columns:1fr 1fr;}
    }
  </style>
</head>
