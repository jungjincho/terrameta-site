<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terra Meta Co., Ltd.</title>

<style>
:root{
--navy:#061f43;
--blue:#0b3d82;
--gold:#d9a441;
--light:#f4f7fb;
--text:#10213f;
--muted:#5b6b83;
--border:#dde6f1;
}

*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;color:var(--text)}

.header{
height:100px;
background:#fff;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 40px;
border-bottom:1px solid #eee;
position:sticky;
top:0;
z-index:10;
}

.nav a{margin:0 15px;font-weight:bold}

.hero{
min-height:600px;
display:flex;
align-items:center;
padding:80px;
color:#fff;

/* ✈️ 비행기 배경 */
background:
linear-gradient(rgba(6,31,67,0.75), rgba(6,31,67,0.85)),
url('https://images.unsplash.com/photo-1504198453319-5ce911bafcde?auto=format&fit=crop&w=1600&q=80')
center/cover no-repeat;
}

.hero h1{
font-size:56px;
font-family:Georgia;
margin-bottom:20px;
}

.btn{
display:inline-block;
margin-top:20px;
padding:14px 28px;
border:1px solid var(--gold);
color:#fff;
text-decoration:none;
}

section{padding:60px}

.footer{
background:#041f42;
color:#fff;
text-align:center;
padding:30px;
}
</style>
</head>

<body>

<header class="header">
<h2>TERRA META</h2>
<div class="nav">
<a href="#">HOME</a>
<a href="#">ABOUT</a>
<a href="#">BUSINESS</a>
<a href="#">CONTACT</a>
</div>
</header>

<section class="hero">
<div>
<h1>CONNECTING GLOBAL VALUE</h1>
<p>We connect global suppliers and markets through trusted partnerships.</p>
<a class="btn" href="mailto:contact@terrameta.co">CONTACT US</a>
</div>
</section>

<section>
<h2>Our Business</h2>
<p>High purity copper supply and global trading platform.</p>
</section>

<footer class="footer">
<p>contact@terrameta.co</p>
<p>© Terra Meta Co., Ltd.</p>
</footer>

</body>
</html>
