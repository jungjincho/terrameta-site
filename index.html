<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terra Meta Co., Ltd.</title>

<style>
:root{--navy:#061f43;--blue:#0b3d82;--gold:#d9a441;--light:#f4f7fb;--text:#10213f;--muted:#5b6b83;--border:#dde6f1}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;font-family:Arial,Helvetica,sans-serif;color:var(--text);background:#fff}

.header{
height:108px;
background:#fff;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 58px;
border-bottom:1px solid #e8eef5;
position:sticky;top:0;z-index:50
}

.nav a{margin:0 15px;font-weight:700}

/* 🔥 HERO 완전 복구 */
.hero{
min-height:560px;
position:relative;
overflow:hidden;
color:#fff;
display:flex;
align-items:center;
padding:82px 70px;
background:linear-gradient(110deg,#041a39 0%,#07316a 52%,#dbeafe 100%)
}

/* 그래픽 효과 */
.hero:before{
content:"";
position:absolute;
inset:0;
opacity:.45;
background:
radial-gradient(circle at 68% 24%,#fff 0 2px,transparent 3px),
radial-gradient(circle at 78% 34%,#fff 0 2px,transparent 3px),
radial-gradient(circle at 88% 48%,#fff 0 2px,transparent 3px),
radial-gradient(circle at 70% 62%,#fff 0 2px,transparent 3px),
radial-gradient(circle at 90% 70%,#fff 0 2px,transparent 3px),
linear-gradient(20deg,transparent 60%,rgba(255,255,255,.45) 61%,transparent 62%),
linear-gradient(-18deg,transparent 55%,rgba(255,255,255,.35) 56%,transparent 57%)
}

/* 배/크레인 그래픽 */
.port-art{
position:absolute;
right:0;
bottom:0;
width:55%;
height:100%;
opacity:.28;
z-index:1
}

.ship{
position:absolute;
right:40px;
bottom:45px;
width:560px;
height:170px;
border-bottom:36px solid rgba(255,255,255,.58);
border-left:60px solid transparent;
border-right:28px solid transparent
}

.crane{
position:absolute;
right:180px;
bottom:210px;
width:300px;
height:170px;
border-left:5px solid rgba(255,255,255,.33);
border-top:5px solid rgba(255,255,255,.33);
transform:skewX(-16deg)
}

.hero-content{
position:relative;
z-index:3;
max-width:650px
}

.hero h1{
font-family:Georgia,serif;
font-size:70px;
margin-bottom:20px
}

.btn{
display:inline-block;
margin-top:20px;
padding:14px 30px;
border:1px solid var(--gold);
color:#fff;
text-decoration:none
}

section{padding:60px}

.footer{
background:#041f42;
color:#fff;
text-align:center;
padding:30px
}
</style>
</head>

<body>

<header class="header">
<h2>TERRA META</h2>
<div class="nav">
<a href="#">HOME</a>
<a href="#">ABOUT</a>
<a href="#">BUSINESS</a>
<a href="#">CONTACT</a>
</div>
</header>

<section class="hero">
<div class="port-art">
<div class="ship"></div>
<div class="crane"></div>
</div>

<div class="hero-content">
<h1>CONNECTING GLOBAL VALUE</h1>
<p>Global platform connecting opportunities and delivering real value.</p>
<a class="btn" href="mailto:contact@terrameta.co">CONTACT US</a>
</div>
</section>

<section>
<h2>Our Business</h2>
<p>High purity copper and global trading solutions.</p>
</section>

<footer class="footer">
<p>contact@terrameta.co</p>
<p>© Terra Meta Co., Ltd.</p>
</footer>

</body>
</html>
